# ── p6spy configuration ───────────────────────────────────────────────────────
# Desactivar todos los appenders (no queremos archivo spy.log ni consola de p6spy)
# Solo usamos el JdbcEventListener personalizado (AuditJdbcEventListener)
appender=com.p6spy.engine.spy.appender.StdoutLogger
logMessageFormat=com.p6spy.engine.spy.appender.SingleLineFormat

# Filtrar SELECTs de Hibernate para no saturar la bitácora con lecturas
# (el listener ya filtra cuando no hay AuditContext activo, pero por si acaso)
excludecategories=info,debug,result,resultset,batch

# Módulos activos — solo JdbcEventListenerModule para nuestro listener
modulelist=com.p6spy.engine.spy.P6SpyFactory

# No crear archivo spy.log (evita error de permisos en contenedores/producción)
logfile=

# Deshabilitar logging interno de p6spy
autoflush=false
