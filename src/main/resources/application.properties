spring.application.name=cohorte

#spring.datasource.url=jdbc:mysql://localhost:3306/cohorte?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=root
#server.port=8080
#secret.key = UNIDAD3BAMG

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway desactivado — el esquema lo gestiona JPA (ddl-auto=update)
spring.flyway.enabled=false

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER_NAME}
spring.datasource.password=${DB_PASSWORD}
server.port=${PORT}
secret.key =${SECRET_KEY}

# MinIO
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:secreto123}
minio.bucket=${MINIO_BUCKET:cohorte-docs}
minio.presigned-expiry-minutes=${MINIO_PRESIGNED_EXPIRY:60}

# Multipart limits (50 MB por archivo)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ── Email — Brevo SMTP relay ──────────────────────────────────────────────────
# Para activar: poner MAIL_ENABLED=true y configurar usuario/contraseña de Brevo
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ac087f001@smtp-brevo.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

notificaciones.mail.from=${MAIL_FROM:garciawalit@gmail.com}
# false = solo loguea, no envía (útil en desarrollo sin credenciales)
notificaciones.mail.enabled=${MAIL_ENABLED:true}

# ── URL del frontend (para enlaces en emails) ────────────────────────────────
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ── Orígenes permitidos en CORS ───────────────────────────────────────────────
# Separados por coma. Dev: localhost:5173. Docker: localhost (nginx en :80).
# Para producción: sobreescribe con CORS_ORIGINS=https://tu-dominio.com
app.cors-origins=${CORS_ORIGINS:http://localhost:5173}

# ── Cookie de sesión (JWT en httpOnly cookie) ─────────────────────────────────
# Secure=true exige HTTPS — en dev local sobre http debe ir en false.
# En producción (detrás de HTTPS) sobreescribir con COOKIE_SECURE=true.
app.cookie-secure=${COOKIE_SECURE:false}
# SameSite: Lax permite navegación normal entre subdominios; Strict es más
# restrictivo. None requiere Secure=true (cross-site).
app.cookie-samesite=${COOKIE_SAMESITE:Lax}

# ── p6spy — Proxy JDBC para captura de SQL en auditoría ──────────────────────
# Desactivar el logging de archivo/slf4j de p6spy; solo usamos el JdbcEventListener
decorator.datasource.p6spy.enable-logging=false


